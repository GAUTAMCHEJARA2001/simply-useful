databases:
  - name: simply-useful-db
    plan: free
    databaseName: simply_useful
    databaseUser: simply_user

services:
  - type: web
    name: simply-useful-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py collectstatic --noinput --skip-checks"
    startCommand: "cd backend && python manage.py migrate --fake-initial && python seed_kamla.py && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 2 --preload --max-requests 500 --max-requests-jitter 50"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: JWT_SECRET
        value: "simply-useful-secret-key-123-super-secure-key-2026"
      - key: DATABASE_URL
        fromDatabase:
          name: simply-useful-db
          property: connectionString
